<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Sign In - Student Hub</title>
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">

    <div class="container d-flex flex-grow-1 align-items-center justify-content-center py-5">
      
      <div class="col-12 col-md-8 col-lg-5 col-xl-4">
        
        <div class="mb-3">
          <a href="index.html" class="btn btn-sm text-white fw-bold px-3 transition-all shadow-sm" style="background-color: #8b5cf6; border-color: #8b5cf6;">
            &larr; Back to Home
          </a>
        </div>
        
        <div class="card border-0 shadow-lg rounded-3">
          <div class="card-body p-4 p-sm-5">
            
            <div class="text-center mb-4">
              <img src="Image/SG.svg" alt="Logo" width="50" height="54" class="mb-3">
              <h3 class="fw-bold">Welcome Back</h3>
              <p class="text-muted small">Please sign in to access your student portal.</p>
            </div>

            <form onsubmit="handleLogin(event)">
              
              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                <label for="emailInput">Email address</label>
              </div>
              
              <div class="form-floating mb-4">
                <input type="password" class="form-control" id="passwordInput" placeholder="Password" required>
                <label for="passwordInput">Password</label>
              </div>

              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" value="" id="rememberCheck">
                <label class="form-check-label text-muted small" for="rememberCheck">
                  Remember me
                </label>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-bold fs-5">
                Sign In
              </button>

            </form>

            <hr class="my-4">

            <div class="text-center">
              <p class="text-muted small mb-0">Don't have an account? <a href="#" class="text-primary text-decoration-none fw-bold">Register here</a></p>
            </div>

          </div>
        </div>
      </div>

    </div>

    <footer class="bg-light text-center text-muted py-4 border-top shadow-sm w-100">
      <div class="container">
        <p class="mb-0 fw-semibold" style="font-size: 0.95rem;">
          &copy; 2026 Abdul Khaliq Bin Abdul Rahman. All rights reserved.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>

  </body>
</html>
