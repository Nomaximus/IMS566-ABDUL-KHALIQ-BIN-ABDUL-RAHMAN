<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Class Timetable - Student Hub</title>

    <script>
      if (localStorage.getItem("isLoggedIn") !== "true") {
        window.location.href = "signin.html";
      }
    </script>
  </head>
  <body class="bg-light">

   <nav class="navbar navbar-light bg-white shadow-sm"> 
      <div class="container-fluid">
        
        <a class="navbar-brand d-inline-flex align-items-center" href="index.html">
          <img src="Image/SG.svg" alt="Logo" width="35" height="38" class="me-2">
          <span class="fw-bold">Student Hub</span>
        </a>
        
        <div class="d-flex align-items-center ms-auto">
          <button class="btn btn-danger px-3 me-2 fw-bold" onclick="logout()" style="background-color: #dc2626; border-color: #dc2626;">
            Sign Out
          </button>
          
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
        
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto pt-2 pb-2"> 
            <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
            <li class="nav-item"><a class="nav-link" href="assignment.html">Task Matrix</a></li>
            <li class="nav-item"><a class="nav-link" href="submissions.html">Submissions</a></li>
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="timetable.html">Timetable</a></li>
            <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
          </ul>
        </div>

      </div>
    </nav>

    <div class="container mt-5">
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="fw-bold m-0">Weekly Timetable</h2>
          <p class="text-muted mb-0">Fall Semester 2026</p>
        </div>
        <span class="badge bg-dark px-3 py-2 fs-7 rounded">Week 1 (Current)</span>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              
              <thead class="table-light">
                <tr>
                  <th scope="col" class="ps-4 py-3 text-uppercase fs-7 text-muted fw-bold">Day / Date</th>
                  <th scope="col" class="py-3 text-uppercase fs-7 text-muted fw-bold">Time Window</th>
                  <th scope="col" class="py-3 text-uppercase fs-7 text-muted fw-bold">Subject & Code</th>
                  <th scope="col" class="py-3 text-uppercase fs-7 text-muted fw-bold">Classroom / Location</th>
                  <th scope="col" class="py-3 text-uppercase fs-7 text-muted fw-bold">Assigned Lecturer</th>
                  <th scope="col" class="pe-4 py-3 text-end text-uppercase fs-7 text-muted fw-bold">Status</th>
                </tr>
              </thead>
              
              <tbody id="timetableBody">
                </tbody>
              
            </table>
          </div>
        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
  </body>
</html>
